name: ci

# Full CI (typecheck + tests) on GitHub-hosted runners; deploy to Cloudflare on
# push to main. prism is PUBLIC and accepts outside PRs, so CI runs on
# ubuntu-latest (fork-safe sandbox), never the self-hosted fleet pool.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo. No write scopes on the token.
permissions:
  contents: read

# Supersede in-flight runs on the same ref so a queued run is never left behind
# stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - name: Render wrangler.toml (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          cp wrangler.example.toml wrangler.toml
          sed -i "s/PLACEHOLDER_RUN_wrangler_d1_create_THEN_PASTE_HERE/${{ secrets.D1_DATABASE_ID }}/" wrangler.toml

      # Apply D1 migrations BEFORE deploy so new code never runs against an old
      # schema. Idempotent: wrangler tracks applied files in d1_migrations and
      # only runs pending ones (mirrors vivijure/postern deploy pipelines).
      - name: Apply D1 migrations (main only)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply skyphusion-llm --remote

      - name: Deploy (main only)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run deploy
          rm -f wrangler.toml
