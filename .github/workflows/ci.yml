name: ci

# Full CI (typecheck + tests) on GitHub-hosted runners on every push/PR; deploy
# to Cloudflare ONLY on a pushed version tag (v*), NEVER on a bare push to main.
# An ordinary merge (even a docs-only one) must not redeploy production. Cut a
# SemVer tag to ship: git tag -a v0.1.0 -m "..." && git push origin v0.1.0.
# prism is PUBLIC and accepts outside PRs, so CI runs on ubuntu-latest
# (fork-safe sandbox), never the self-hosted fleet pool.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo. No write scopes on the token.
permissions:
  contents: read

# Supersede in-flight runs on the same ref so a queued run is never left behind
# stale commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # npm test runs BOTH vitest projects (v0.164.4): the Node pure-function
      # suite and the workerd fetch-handler integration suite
      # (@cloudflare/vitest-pool-workers). Both are fork-safe: local Miniflare
      # bindings, no secrets, no network, so this runs on ubuntu-latest.
      - run: npm test

  # DEPLOY GATE: runs ONLY for a pushed version tag (refs/tags/v*), after ci passes.
  # A push/merge to main runs `ci` above but never reaches here, so no merge can
  # redeploy prod.
  deploy:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert tag is on main (no prod deploy from an unmerged branch)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on origin/main; refusing to deploy an unreviewed commit"
            exit 1
          fi
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
      - run: npm ci

      - name: Render wrangler.toml
        run: |
          cp wrangler.example.toml wrangler.toml
          sed -i "s/PLACEHOLDER_RUN_wrangler_d1_create_THEN_PASTE_HERE/${{ secrets.D1_DATABASE_ID }}/" wrangler.toml
          # play.skyphusion.org prod: first-party auth, no CF Access (prism#106, fleet#940).
          sed -i 's/# \[vars\]/[vars]/' wrangler.toml
          sed -i 's/# AUTH_MODE = "public"/AUTH_MODE = "public"/' wrangler.toml

      # Apply D1 migrations BEFORE deploy so new code never runs against an old
      # schema. Idempotent: wrangler tracks applied files in d1_migrations and
      # only runs pending ones (mirrors vivijure/postern deploy pipelines).
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply skyphusion-llm --remote

      - name: Deploy
        run: |
          npm run deploy
          rm -f wrangler.toml
